<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeBag - Smart Tracker</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🧳</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-color: #050505;
      --glass-bg: rgba(20, 20, 25, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #FFFFFF;
      --text-muted: #8892B0;
      --accent-cyan: #00F0FF;
      --accent-cyan-glow: rgba(0, 240, 255, 0.5);
      --accent-gold: #FFC000;
      --accent-gold-glow: rgba(255, 192, 0, 0.5);
      --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-color);
      /* Subtle animated radial gradient background */
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.04), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 192, 0, 0.04), transparent 25%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ---- GLASSMORPHISM UTILS ---- */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--panel-shadow);
    }

    /* ---- ZONE BADGE ---- */
    #zone-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.4s ease;
      margin-bottom: 24px;
      border: 1px solid transparent;
    }
    #zone-badge.badge-waiting  { background: rgba(255,255,255,0.05); color: var(--text-muted); border-color: rgba(255,255,255,0.08); }
    #zone-badge.badge-a        { background: rgba(0,240,255,0.12);   color: var(--accent-cyan); border-color: rgba(0,240,255,0.3); box-shadow: 0 0 12px rgba(0,240,255,0.2); }
    #zone-badge.badge-b        { background: rgba(255,192,0,0.12);   color: var(--accent-gold); border-color: rgba(255,192,0,0.3);  box-shadow: 0 0 12px rgba(255,192,0,0.2); }
    #zone-badge.badge-collected{ background: rgba(0,255,140,0.12);   color: #00FF8C;             border-color: rgba(0,255,140,0.3);  box-shadow: 0 0 12px rgba(0,255,140,0.2); }

    /* ---- STATUS BOX collected state ---- */
    #status-wrapper.active-collected .status-glow {
      background: #00FF8C;
      opacity: 0.25;
    }
    #status-box.status-collected {
      background: rgba(0,255,140,0.05);
      border: 1px solid rgba(0,255,140,0.3);
      color: var(--text-main);
      box-shadow: inset 0 0 40px rgba(0,255,140,0.05);
    }
    #status-box.status-collected #status-text-highlight {
      color: #00FF8C;
      text-shadow: 0 0 20px rgba(0,255,140,0.6);
    }

    /* ---- LIVE DOT ---- */
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* ---- MAIN CONTENT ---- */
    #main {
      padding: 100px 40px 60px;
      /* Space for the top-left menu button on all screen sizes */
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    h1.main-header {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 32px;
      background: linear-gradient(135deg, #FFFFFF 0%, #A0AABF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }

    .info-row {
      display: flex;
      gap: 48px;
      margin-bottom: 40px;
      font-size: 1.05rem;
      color: var(--text-muted);
      background: var(--glass-bg);
      padding: 16px 32px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
    }

    .info-row span b {
      color: var(--text-main);
      font-weight: 600;
      margin-left: 8px;
    }

    /* ---- STATUS BOX ---- */
    #status-wrapper {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin-bottom: 40px;
    }

    /* The glowing background behind the status box */
    .status-glow {
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: transparent;
      z-index: 0;
      filter: blur(15px);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #status-box {
      position: relative;
      width: 100%;
      padding: 48px 32px;
      border-radius: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 1.75rem;
      z-index: 1;
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
    }

    /* Waiting State */
    #status-box.status-waiting {
      background: var(--glass-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    /* Active States */
    #status-wrapper.active-a .status-glow {
      background: var(--accent-cyan);
      opacity: 0.3;
      animation: breatheA 3s ease-in-out infinite alternate;
    }

    #status-box.status-a {
      background: rgba(0, 240, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: var(--text-main);
      box-shadow: inset 0 0 40px rgba(0, 240, 255, 0.05);
    }

    #status-box.status-a #status-text-highlight {
      color: var(--accent-cyan);
      text-shadow: 0 0 20px var(--accent-cyan-glow);
    }

    #status-wrapper.active-b .status-glow {
      background: var(--accent-gold);
      opacity: 0.3;
      animation: breatheB 3s ease-in-out infinite alternate;
    }

    #status-box.status-b {
      background: rgba(255, 192, 0, 0.05);
      border: 1px solid rgba(255, 192, 0, 0.3);
      color: var(--text-main);
      box-shadow: inset 0 0 40px rgba(255, 192, 0, 0.05);
    }

    #status-box.status-b #status-text-highlight {
      color: var(--accent-gold);
      text-shadow: 0 0 20px var(--accent-gold-glow);
    }

    @keyframes breatheA {
      0% {
        opacity: 0.15;
        transform: scale(0.98);
      }

      100% {
        opacity: 0.4;
        transform: scale(1.02);
      }
    }

    @keyframes breatheB {
      0% {
        opacity: 0.15;
        transform: scale(0.98);
      }

      100% {
        opacity: 0.4;
        transform: scale(1.02);
      }
    }

    #status-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #status-box:not(.status-waiting) #status-icon {
      transform: scale(1.1) translateY(-5px);
    }

    #status-text {
      line-height: 1.4;
      font-weight: 500;
    }

    #status-text-highlight {
      display: block;
      font-size: 2.2rem;
      font-weight: 800;
      margin-top: 8px;
    }

    /* ---- CONVEYOR IMAGE ---- */
    .image-container {
      width: 100%;
      max-width: 600px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
    }

    /* Inner shadow overlay for image blending */
    .image-container::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    #conveyor-img {
      width: 100%;
      display: block;
      transition: transform 0.7s ease, filter 0.7s ease;
      filter: brightness(0.8) contrast(1.1);
    }

    .image-container:hover #conveyor-img {
      transform: scale(1.03);
      filter: brightness(1) contrast(1.1);
    }

    /* ---- RESPONSIVE MOBILE TWEAKS ---- */
    @media (max-width: 768px) {
      body {
        background-image: none;
      }

      /* Simpler bg for mobile perf */

      #sidebar {
        width: 300px;
        /* Slightly wider mobile drawer */
      }

      #sidebar-overlay.active {
        display: block;
        opacity: 1;
      }

      #main {
        margin-left: 0;
        width: 100%;
        padding: 100px 20px 40px;
      }

      h1.main-header {
        font-size: 2.5rem;
      }

      .info-row {
        flex-direction: column;
        gap: 16px;
        border-radius: 20px;
        padding: 20px;
        width: 100%;
        max-width: 320px;
      }

      #status-box {
        padding: 32px 20px;
        font-size: 1.4rem;
        min-height: 180px;
      }

      #status-text-highlight {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- MAIN CONTENT -->
  <main id="main">
    <h1 class="main-header">LeBag 🧳</h1>

    <!-- Zone badge -->
    <div id="zone-badge" class="badge-waiting">
      <span class="live-dot"></span>
      <span id="zone-badge-text">Waiting…</span>
    </div>

    <div class="info-row glass-panel">
      <span>Passenger: <b id="passenger-name">—</b></span>
      <span>Bag ID: <b id="passenger-tag">—</b></span>
    </div>

    <!-- Dynamic status box wrapped for outer glow effect -->
    <div id="status-wrapper">
      <div class="status-glow"></div>
      <div id="status-box" class="status-waiting glass-panel">
        <div id="status-icon">⏳</div>
        <div id="status-text">Waiting for bag detection…</div>
      </div>
    </div>

    <!-- Conveyor image with premium container -->
    <div class="image-container">
      <img id="conveyor-img" src="assets/conveyor.png" alt="Conveyor belt" onerror="this.style.display='none'" />
    </div>
  </main>

  <script>
    // ---- DOM refs ----
    const statusWrapper  = document.getElementById('status-wrapper');
    const statusBox      = document.getElementById('status-box');
    const statusIcon     = document.getElementById('status-icon');
    const statusText     = document.getElementById('status-text');
    const passengerName  = document.getElementById('passenger-name');
    const passengerTag   = document.getElementById('passenger-tag');
    const zoneBadge      = document.getElementById('zone-badge');
    const zoneBadgeText  = document.getElementById('zone-badge-text');

    // Optional: filter by tag in URL so each passenger only sees their bag
    const urlTag = new URLSearchParams(window.location.search).get('tag');

    let lastStatus = null;

    function applyState(scan) {
      const owner  = scan.owner  || '—';
      const tagId  = scan.tagId  || '—';
      const status = (scan.status || 'Waiting').toLowerCase();
      const zone   = scan.zone;

      // If URL has a tag filter but it doesn't match, keep showing previous state
      if (urlTag && tagId && tagId !== urlTag && status !== 'waiting') return;

      passengerName.textContent = owner;
      passengerTag.textContent  = tagId;

      // Avoid redundant DOM thrash
      if (status === lastStatus) return;
      lastStatus = status;

      statusWrapper.className = '';
      statusBox.className     = 'glass-panel';
      zoneBadge.className     = 'badge-waiting';

      if (status === 'collected') {
        statusWrapper.classList.add('active-collected');
        statusBox.classList.add('status-collected');
        statusIcon.textContent  = '✅';
        statusText.innerHTML    = `${owner}'s bag has been<span id='status-text-highlight'>COLLECTED</span>`;
        zoneBadge.classList.replace('badge-waiting', 'badge-collected');
        zoneBadgeText.textContent = '✅ Collected';

      } else if (status === 'zone b' || zone === 'B') {
        statusWrapper.classList.add('active-b');
        statusBox.classList.add('status-b');
        statusIcon.textContent  = '🧳';
        statusText.innerHTML    = `Your bag is approaching<span id='status-text-highlight'>ZONE B</span>`;
        zoneBadge.classList.replace('badge-waiting', 'badge-b');
        zoneBadgeText.textContent = '🟡 Zone B — Almost there!';

      } else if (status === 'zone a' || status === 'on belt' || zone === 'A') {
        statusWrapper.classList.add('active-a');
        statusBox.classList.add('status-a');
        statusIcon.textContent  = '🧳';
        statusText.innerHTML    = `Your bag is on the belt in<span id='status-text-highlight'>ZONE A</span>`;
        zoneBadge.classList.replace('badge-waiting', 'badge-a');
        zoneBadgeText.textContent = '🔵 Zone A — On belt';

      } else {
        statusBox.classList.add('status-waiting');
        statusIcon.textContent  = '⏳';
        statusText.textContent  = 'Waiting for bag detection…';
        zoneBadgeText.textContent = 'Waiting…';
      }
    }

    // ---- Poll current_scan.json every 1 second ----
    async function pollScan() {
      try {
        const res  = await fetch('/current_scan.json?_=' + Date.now());
        const scan = await res.json();
        applyState(scan);
      } catch (e) {
        console.warn('Poll failed:', e);
      }
    }

    pollScan(); // immediate first load
    setInterval(pollScan, 1000);
  </script>
</body>

</html>
